site_name: Dive Telemetry
site_description: Convert dive computer exports into Telemetry overlay CSV format
docs_dir: docs

# repo_url: https://github.com/your-org/dive-telemetry   # ← add your GitHub URL
# repo_name: dive-telemetry

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - CLI Usage: cli-usage.md
  - Developer Guide:
      - Parsing & Domain Model: parsing-and-domain-model.md
      - Plugin System: plugin-system.md
      - Creating Plugins: creating-plugins.md
      - Adding Plugins to UI & CLI: adding-plugins-to-ui-cli.md
      - Adding Dive Computers: adding-dive-computers.md
      - Error Handling: error-handling.md
  - Reference:
      - VBA Macro Gap Analysis: gap-analysis.md
